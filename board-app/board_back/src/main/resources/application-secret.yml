# 이 파일은 버전 관리에서 제외됩니다 (.gitignore)
# 각 OAuth2 플랫폼에서 발급받은 값으로 교체하세요

spring:
  security:
    oauth2:
      client:

        # ── OAuth2 Provider 엔드포인트 (변경 불필요) ──────────────────
        provider:
          naver:
            authorizationUri: https://nid.naver.com/oauth2.0/authorize
            tokenUri: https://nid.naver.com/oauth2.0/token
            userInfoUri: https://openapi.naver.com/v1/nid/me
            userNameAttribute: response
          kakao:
            authorizationUri: https://kauth.kakao.com/oauth/authorize
            tokenUri: https://kauth.kakao.com/oauth/token
            userInfoUri: https://kapi.kakao.com/v2/user/me
            userNameAttribute: id

        # ── OAuth2 앱 등록 정보 (본인 키로 교체 필요) ─────────────────
        registration:
          google:
            clientId: your_google_client_id         # Google Cloud Console에서 발급
            clientSecret: your_google_client_secret
            authorizationGrantType: authorization_code
            clientAuthenticationMethod: POST
            clientName: Google
            scope:
              - profile

          naver:
            clientId: your_naver_client_id           # 네이버 개발자 센터에서 발급
            clientSecret: your_naver_client_secret
            redirectUri: http://localhost:8080/login/oauth2/code/naver
            authorizationGrantType: authorization_code
            clientAuthenticationMethod: POST
            clientName: Naver

          kakao:
            clientId: your_kakao_client_id           # 카카오 개발자 센터에서 발급
            clientSecret: your_kakao_client_secret
            redirectUri: http://localhost:8080/login/oauth2/code/kakao
            authorizationGrantType: authorization_code
            clientAuthenticationMethod: POST
            clientName: Kakao

# ── JWT 서명 키 (256bit 이상 랜덤 문자열 권장) ──────────────────────
jwt:
  secret: your_jwt_secret_key_here

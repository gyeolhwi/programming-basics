<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            width: 100%;
            height: 1000px;
            display: flex;
            justify-content: center;
        }

        .container-sub-box {
            /* 축설정 */
            flex-direction: column;
            /* 변경 */
            display: flex;
            justify-content: space-around;

            width: 700px;
            height: 900px;
            margin: 10px;
            padding: 20px;
            border: 1px solid #dbdbdb;
        }

        .boxs {
            display: flex;
            width: 100%;
            ;
            height: 40%;
            border: 1px solid #dbdbdb;
            /* justify-content: space-between; */

        }

        .one {
            /* 행열 */
            flex-direction: column;
            flex-wrap: wrap;
            /* 거리조정 */
            justify-content: space-between;
            align-content: space-between;
        }

        .one-boxs {
            display: flex;
            height: 100%;
            flex-direction: column;
            justify-content: space-between;
        }

        .two {
            justify-content: center;
            align-items: center;
        }

        .three {
            flex-direction: column;
            /* justify-content: space-between; */
        }
        .three-box{
            display: flex;
            justify-content: space-between;
        }
        .four {
            flex-direction: column;
            align-items: center;

            justify-content: space-between;
        }

        .box {
            width: 100px;
            height: 100px;
            border: 1px solid #dbdbdb;
        }

    </style>
</head>

<body>
    <div class="container">
        <!-- width 700 박스간 height 900px margin 20px 즉 10px padding 20px -->
        <div class="container-sub-box">
            <!-- width100% , height 40% -->
            <div class="boxs one">
                <!-- 박스들 100x100px -->
                <div class="one-boxs">
                    <div class="box"></div>
                    <div class="box"></div>
                </div>
                <div class="one-boxs">
                    <div class="box"></div>
                    <div class="box"></div>
                </div>
            </div>
            <!-- 중앙배치 -->
            <div class="boxs two">
                <div class="box"></div>
            </div>
        </div>
        <!-- width 700 -->
        <div class="container-sub-box">
            <!-- flex-start , between -->
            <div class="boxs three">
                <div class="three-box">
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>
                </div>
                <div class="three-box">
                    <div class="box"></div>
                    <div class="box"></div>
                    <div class="box"></div>
                </div>
            </div>
            <!-- 중앙 수직 세개 배치 -->
            <div class="boxs four">
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
            </div>
        </div>
    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인접형제선택자,형제선택자</title>
    <style>
        /* 인접형제 */
        main>h1+div>h1 {
            color: pink;
        }

        /* 형제 */
        main>h1~div>h1 {
            color: brown;
        }
        /* 모든 요소 *  */
    </style>
</head>

<body>
    <main>
        <h1>제목1</h1>
        <div>
            <h1>제목2</h1>
        </div>
        <p>예쓰</p>
        <div>
            <h1>제목3</h1>
        </div>
    </main>
</body>

</html>

spring:
  config:
    import: application-secret.yml
  datasource:
    url: jdbc:h2:file:./data/auth_db;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
    initialization-mode: NEVER
    schema: classpath:schema.sql

  h2:
    console:
      enabled: true
      path: /h2-console

mybatis:
  mapper-locations:
    - /mappers/*.xml

user:
  profile:
    img:
      default: https://firebasestorage.googleapis.com/v0/b/userprofile-eada6.appspot.com/o/user%2Fdefault.png?alt=media&token=bd9ab00a-fa12-480d-a7a4-4e8d16d0fdb5
